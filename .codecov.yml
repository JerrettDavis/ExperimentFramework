codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 75%
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 5%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

flags:
  unittests:
    paths:
      - src/
    carryforward: true
  e2e:
    paths:
      - src/
      - samples/ExperimentFramework.DashboardHost/
    carryforward: true

ignore:
  - "samples/**"
  - "benchmarks/**"
  - "tools/**"
  - "docs/**"
  - "tests/**"
