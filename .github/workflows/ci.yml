name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_NOLOGO: true
  INCLUDE_SYMBOLS: true
  MSBUILDDISABLENODEREUSE: 1

jobs:
  pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: |
          dotnet tool restore
          dotnet restore --use-lock-file

      - name: Build (Release)
        run: dotnet build ExperimentFramework.slnx --configuration Release --no-restore /p:ContinuousIntegrationBuild=true /p:BuildInParallel=false

      - name: Test with coverage
        run: |
          dotnet test ExperimentFramework.slnx \
            --configuration Release \
            -p:ExcludeE2ETests=true \
            --collect:"XPlat Code Coverage" \
            --settings tests/ExperimentFramework.Tests/coverage.runsettings

      - name: Install ReportGenerator
        run: dotnet tool update -g dotnet-reportgenerator-globaltool

      - name: Combine coverage and create reports
        shell: bash
        run: |
          REPORTS=$(find . -type f -path "*/TestResults/*/coverage.cobertura.xml" | tr '\n' ';')
          reportgenerator \
            -reports:"$REPORTS" \
            -targetdir:"coverage-report" \
            -reporttypes:"HtmlInline;Cobertura;TextSummary;lcov;Badges" \
            -assemblyfilters:"+ExperimentFramework*;-*Tests*;-*SampleConsole*;-*SampleWebApp*;-*ComprehensiveSample*;-*Benchmarks*" \
            -filefilters:"-**/*.Tests/*;-**/*Tests*/**;-**/samples/**;-**/benchmarks/**"
          echo "COVERAGE_SUMMARY<<EOF" >> $GITHUB_ENV
          cat coverage-report/Summary.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report
          retention-days: 14

      - name: Add coverage summary to PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          recreate: true
          message: |
            ## Code Coverage
            ```
            ${{ env.COVERAGE_SUMMARY }}
            ```

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: |
            **/TestResults/*/coverage.cobertura.xml
          flags: unittests
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docs-build-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Install docfx
        run: dotnet tool update -g docfx

      - name: Build solution (Release)
        run: dotnet build ExperimentFramework.slnx --configuration Release /p:BuildInParallel=false

      - name: Build docs
        run: docfx docs/docfx.json

  # E2E tests run the Playwright + Reqnroll suite against a live DashboardHost
  # seeded with demo data (5 experiments, governance records, 4 test users). The
  # host is launched under dotnet-coverage so that server-side code is instrumented,
  # probed for readiness, and torn down after the suite completes so the coverage
  # report is flushed. The resulting cobertura file is uploaded to Codecov with the
  # "e2e" flag (separate from the "unittests" flag).
  e2e-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: pr-checks
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: |
          dotnet tool restore
          dotnet restore --use-lock-file

      - name: Build solution (Release)
        # The E2E suite drives the DashboardHost, which pulls in the full
        # solution graph (Dashboard.UI RCL, Governance, Admin, etc.). Build the
        # whole solution so `dotnet run --no-build` and `dotnet test --no-build`
        # both succeed without re-triggering Razor compilation.
        run: dotnet build ExperimentFramework.slnx --configuration Release --no-restore /p:BuildInParallel=false

      - name: Install Playwright browsers
        run: |
          PLAYWRIGHT_PS1=$(find tests/ExperimentFramework.E2E.Tests/bin/Release -name "playwright.ps1" | head -1)
          if [ -z "$PLAYWRIGHT_PS1" ]; then
            echo "playwright.ps1 not found" >&2
            exit 1
          fi
          pwsh "$PLAYWRIGHT_PS1" install --with-deps chromium

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Launch DashboardHost under dotnet-coverage (background, seeded)
        # dotnet-coverage collect wraps the host process so that server-side code
        # is instrumented. Coverage is written to e2e-dashboard-coverage.xml when
        # the process exits (SIGTERM flushes the report automatically).
        # Intentionally NOT using --no-build for the same reason as before:
        # the release-mode runtime artifacts are already present from the build
        # step, but dotnet run --no-build resolves the apphost differently.
        run: |
          dotnet-coverage collect \
            -f cobertura \
            -o e2e-dashboard-coverage.xml \
            "dotnet run --project samples/ExperimentFramework.DashboardHost --configuration Release -- --seed=docs --freeze-date 2026-04-01T12:00:00Z --Urls=http://localhost:5195" \
            > dashboard-host.log 2>&1 &
          echo "COVERAGE_PID=$!" >> $GITHUB_ENV

      - name: Wait for DashboardHost readiness
        run: |
          for i in $(seq 1 40); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5195/dashboard || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "302" ]; then
              echo "Dashboard is ready (HTTP $status) after $i attempts"
              exit 0
            fi
            echo "Attempt $i/40 — waiting 3s (last status: $status)..."
            sleep 3
          done
          echo "Dashboard did not become ready in 120 seconds" >&2
          echo "---- dashboard-host.log (tail) ----" >&2
          tail -n 200 dashboard-host.log >&2 || true
          exit 1

      - name: Run E2E tests
        env:
          E2E__BaseUrl: http://localhost:5195
          E2E__Headless: "true"
        run: |
          dotnet test tests/ExperimentFramework.E2E.Tests/ \
            --configuration Release \
            --filter "Category!=Manual" \
            --logger "trx;LogFileName=e2e.trx" \
            --logger "console;verbosity=normal"

      - name: Stop DashboardHost (flush coverage)
        if: always()
        run: |
          # Send SIGTERM to the dotnet-coverage wrapper process so it flushes
          # the cobertura report before we upload. Allow a few seconds for
          # the flush to complete.
          if [ -n "${COVERAGE_PID:-}" ]; then
            kill -TERM "$COVERAGE_PID" 2>/dev/null || true
            sleep 5
          fi

      - name: Upload E2E coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: e2e-dashboard-coverage.xml
          flags: e2e
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload DashboardHost log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-host-log
          path: dashboard-host.log
          retention-days: 7

      - name: Upload E2E failure screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-screenshots
          path: tests/ExperimentFramework.E2E.Tests/bin/Release/net10.0/TestResults/Screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload E2E coverage report as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-coverage-report
          path: e2e-dashboard-coverage.xml
          retention-days: 14
          if-no-files-found: ignore

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: |
          dotnet restore --use-lock-file
          dotnet tool restore

      - name: Fetch tags
        run: git fetch --prune --tags

      - name: Clean GitVersion cache
        run: rm -rf .git/gitversion_cache || true

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.x'

      - name: Display GitVersion version
        run: dotnet-gitversion /version

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4

      - name: Set version env vars
        run: |
          echo "PACKAGE_VERSION=${{ steps.gitversion.outputs.majorMinorPatch }}" >> $GITHUB_ENV
          echo "ASSEMBLY_VERSION=${{ steps.gitversion.outputs.assemblySemVer }}" >> $GITHUB_ENV
          echo "FILE_VERSION=${{ steps.gitversion.outputs.assemblySemFileVer }}" >> $GITHUB_ENV

      - name: Build (Release)
        run: >
          dotnet build ExperimentFramework.slnx
          --configuration Release
          --no-restore
          /p:ContinuousIntegrationBuild=true
          /p:BuildInParallel=false
          /p:Version=${{ env.PACKAGE_VERSION }}
          /p:AssemblyVersion=${{ env.ASSEMBLY_VERSION }}
          /p:FileVersion=${{ env.FILE_VERSION }}
          /p:PackageVersion=${{ env.PACKAGE_VERSION }}

      - name: Test (Release)
        run: |
          dotnet test ExperimentFramework.slnx \
            --configuration Release \
            --no-build \
            --verbosity normal \
            -p:ExcludeE2ETests=true \
            --collect:"XPlat Code Coverage" \
            --settings tests/ExperimentFramework.Tests/coverage.runsettings

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: |
            **/TestResults/*/coverage.cobertura.xml
          flags: unittests
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Pack (all packable projects)
        run: >
          dotnet pack ExperimentFramework.slnx
          --configuration Release
          --no-build
          --output ./artifacts
          /p:ContinuousIntegrationBuild=true
          /p:Version=${{ env.PACKAGE_VERSION }}
          /p:AssemblyVersion=${{ env.ASSEMBLY_VERSION }}
          /p:FileVersion=${{ env.FILE_VERSION }}
          /p:PackageVersion=${{ env.PACKAGE_VERSION }}

      - name: Generate configuration schemas
        run: |
          dotnet run --project tools/ExperimentFramework.SchemaGenerator/ExperimentFramework.SchemaGenerator.csproj -- ./artifacts/schemas
          echo "Generated schema files:"
          ls -lh ./artifacts/schemas/

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
          retention-days: 30

      - name: Upload schema files as artifact
        uses: actions/upload-artifact@v7
        with:
          name: configuration-schemas
          path: ./artifacts/schemas/*.json
          retention-days: 30

      - name: Create and push git tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if git rev-parse "v${PACKAGE_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${PACKAGE_VERSION} already exists. Skipping tag push."
          else
            git tag "v${PACKAGE_VERSION}"
            git push origin "v${PACKAGE_VERSION}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          name: Release v${{ env.PACKAGE_VERSION }}
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
            ./artifacts/schemas/*.json
          generate_release_notes: true

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push ./artifacts/*.nupkg \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          else
            echo "Skipping NuGet.org push: API key not set."
          fi

      - name: Push to GitHub Packages (optional)
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate
          dotnet nuget push "./artifacts/*.snupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate
